services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_AUTH_URL=http://auth:8000
      - NEXT_PUBLIC_CORE_URL=http://core:8001
      - INVESTOR_DEMO=true
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./services/auth:/app
      - ./shared:/shared

  core:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./services/core:/app
      - ./shared:/shared
